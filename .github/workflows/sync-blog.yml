name: Sync Blogger RSS to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      max_results:
        description: "Override MAX_RESULTS (default 500 for manual runs)"
        required: false
        default: "500"
  schedule:
    # Twice per day (00:00 and 12:00 UTC)
    - cron: "0 0,12 * * *"

jobs:
  sync-blog:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'schedule' && github.ref == 'refs/heads/main')
    
    env:
      # For scheduled runs use 5; for manual runs use input or fallback 500.
      MAX_RESULTS: ${{ github.event_name == 'schedule' && '5' || (github.event.inputs.max_results || '500') }}
      BASE_URL: ${{ secrets.BLOG_DOMAIN }}
      OLD_DOMAIN: ${{ secrets.BLOG_OLD_DOMAIN }}
      NEW_DOMAIN: ${{ secrets.BLOG_NEW_DOMAIN }}
      LOG_LEVEL: INFO

    steps:
      # 1. Clone your code from BLOG2GHP (where sync_blog.py lives)
      - name: Clone Project Repository (BLOG2GHP) [project-src]
        uses: actions/checkout@v4
        with:
          repository: lexxai/BLOG2GHP
          path: project-src

      # 2. Clone the TARGET Pages repo (lexxai) to push changes here
      - name: Clone Target Pages Repo (lexxai) [publish-dir]
        uses: actions/checkout@v4
        with:
          repository: lexxai/lexxai
          ref: gh-pages
          path: publish-dir

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd project-src
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 5. Run the sync script
      - name: Run blog sync
        if: always() 
        run: |
          echo "Running sync with MAX_RESULTS=${MAX_RESULTS} in in project-src"
          cd project-src
          python sync_blog.py --verbose --dest ../publish-dir 

      # 6. Commit changes TO THE TARGET REPO (lexxai)
      - name: Commit changes
        working-directory: publish-dir
        if: always()
        run: |
          # Ensure we are on the target branch
          git checkout gh-pages

          # CORRECT CHECK: Detects BOTH untracked (new) and modified files
          # --porcelain gives machine-readable output, empty if clean
          CHANGES=$(git ls-files --others --modified)

          if [ -z "$CHANGES" ]; then
            echo "No changes to commit (no untracked or modified files)."
            exit 0
          fi

          echo "Changes detected:"
          echo "$CHANGES"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout 
          git add -A
          git commit -m "Sync blog from RSS (MAX_RESULTS=${MAX_RESULTS})"

        # 7. Push changes to the Pages branch
      - name: Push changes to Pages Repo
        working-directory: publish-dir
        if: success()
        run: |
         # Check if we have unpushed commits (HEAD is ahead of origin/gh-pages)
          if git log --oneline HEAD...origin/gh-pages | grep -q .; then
            echo "Commits to push found."
          else
            echo "No new commits to push."
            exit 0
          fi
          
          # --- START: Check if token exists ---
          if [ -z "${{ secrets.PAGES_PUSH_TOKEN }}" ]; then
            echo "❌ ERROR: The secret 'PAGES_PUSH_TOKEN' is empty or not configured."
            echo "Please add a valid Personal Access Token to the repository secrets."
            exit 1
          fi
          # --- END: Check ---

          echo "✅ Token is present (length: ${{ secrets.PAGES_PUSH_TOKEN }} has ${{ secrets.PAGES_PUSH_TOKEN | length }} chars)"


          git remote set-url origin https://x-access-token:${{ secrets.PAGES_PUSH_TOKEN }}@github.com/lexxai/lexxai.git
          git checkout
          git status
          git push origin gh-pages
